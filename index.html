<head>
  <meta charset="utf-8">

  <meta name="apple-mobile-web-app-capable" content="yes">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Resenha FC">
  <meta name="description" content="Organização completa de peladas: membros, presença, times, caixa, churrasco e avaliações confidenciais.">
  <link rel="manifest" href="/manifest.json">
  <script src="/pwa-bootstrap.js?v=beta120"></script>
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon-180x180-v023.png?v=0.3.0">
  <link rel="apple-touch-icon" sizes="167x167" href="apple-touch-icon-167x167-v023.png?v=0.3.0">

  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/android-chrome-192x192.png">
  <link rel="preload" as="image" href="login-logo-transparent-v0311.png" type="image/png">
  <link rel="stylesheet" href="styles.css?v=beta120">
  <title>Resenha FC</title>
</head>
<body>
  <div id="app" class="app-shell" aria-live="polite">
    <header class="topbar">
      <div class="group-switcher">
        <button id="groupAvatarButton" class="group-emblem-button" type="button" aria-label="Personalizar grupo">
          <img id="groupAvatar" class="top-group-avatar" src="brand/brand-mark-transparent-v0311.png" alt="Resenha FC" width="46" height="46" data-group-avatar>
        </button>
        <button id="groupButton" class="group-button" type="button" aria-label="Selecionar grupo">
          <span class="group-copy"><strong id="groupName">Resenha FC</strong><small id="syncLabel">Conectando à nuvem</small></span>
          <span class="chevron" aria-hidden="true">⌄</span>
        </button>
      </div>
      <div class="top-actions">
        <button id="notificationButton" class="notification-button" type="button" aria-label="Abrir avisos do grupo" hidden><span aria-hidden="true">🔔</span></button>
        <button id="profileButton" class="avatar-button" type="button" aria-label="Abrir perfil">?</button>
      </div>
    </header>

    <main id="mainContent" class="main-content"></main>

    <nav class="bottom-nav" aria-label="Navegação principal">
      <button data-route="home" class="nav-item active"><span>⌂</span><small>Início</small></button>
      <button data-route="matches" class="nav-item"><span>▣</span><small>Jogos</small></button>
      <button data-route="teams" class="nav-item"><span>⇄</span><small>Times</small></button>
      <button data-route="members" class="nav-item"><span>♟</span><small>Membros</small></button>
      <button data-route="finance" class="nav-item"><span>R$</span><small>Caixa</small></button>
      <button data-route="more" class="nav-item"><span>•••</span><small>Mais</small></button>
    </nav>
  </div>

  <div id="modalRoot"></div>
  <div id="toastRoot" class="toast-root" aria-live="assertive"></div>

  <script src="group-avatars-data.js?v=beta120"></script>
  <script src="supabase-config.js?v=0.3.3"></script>
  <script src="app.js?v=beta120"></script>
  <!-- Cloudflare Web Analytics — instalação manual -->
  <script
    type="module"
    src="https://static.cloudflareinsights.com/beacon.min.js"
    data-cf-beacon='{"token":"5af5f626d10e4df1866bae8757dc335d"}'
  ></script>

</body>
</html>
