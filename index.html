  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Resenha FC">
  <meta name="description" content="Organização completa de peladas entre amigos: presença, times, caixa, churrasco, avaliações e estatísticas.">

  <link rel="icon" type="image/png" sizes="192x192" href="icons/android-chrome-192x192.png">

  <link rel="apple-touch-startup-image" href="icons/splash/apple-splash-1242-2688.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="icons/splash/apple-splash-1170-2532.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)">

  <link rel="stylesheet" href="styles.css">
  <title>Resenha FC</title>
</head>
<body>
  <div id="app" class="app-shell" aria-live="polite">
    <header class="topbar">
      <button id="groupButton" class="group-button" type="button" aria-label="Selecionar grupo">
        <img class="brand-mark" src="brand/brand-mark.png" alt="" width="42" height="42">
        <span class="group-copy">
          <strong id="groupName">Resenha FC</strong>
          <small id="syncLabel">Conectando à nuvem</small>
        </span>
        <span aria-hidden="true">⌄</span>
      </button>
      <button id="profileButton" class="avatar-button" type="button" aria-label="Abrir perfil">EB</button>
    </header>

    <main id="mainContent" class="main-content"></main>

    <nav class="bottom-nav" aria-label="Navegação principal">
      <button data-route="home" class="nav-item active"><span>⌂</span><small>Início</small></button>
      <button data-route="matches" class="nav-item"><span>▣</span><small>Jogos</small></button>
      <button data-route="teams" class="nav-item"><span>⇄</span><small>Times</small></button>
      <button data-route="finance" class="nav-item"><span>R$</span><small>Caixa</small></button>
      <button data-route="ranking" class="nav-item"><span>★</span><small>Ranking</small></button>
      <button data-route="more" class="nav-item"><span>•••</span><small>Mais</small></button>
    </nav>
  </div>

  <div id="modalRoot"></div>
  <div id="toastRoot" class="toast-root" aria-live="assertive"></div>

  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
